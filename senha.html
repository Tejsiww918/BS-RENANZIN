<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gerar Senha</title>
<style>
body{
  font-family: Arial;
  text-align: center;
  margin-top: 60px;
}
button{
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
}
#senha{
  margin-top: 20px;
  font-size: 20px;
  font-weight: bold;
}
</style>
</head>
<body>

<h2>Para continuar o download</h2>
<p>Clique no botão <b>Criar Senha</b> e copie a senha que aparecer.</p>

<button onclick="gerarSenha()">Criar Senha</button>

<p id="senha"></p>

<br><br>

<!-- Botão que manda para o download -->
<button onclick="irDownload()">Ir para página de Download</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Config do Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBQAQX1mUendOheuxjdQHSpMlIpC6DNb3Q",
  authDomain: "senhas-4d7ab.firebaseapp.com",
  projectId: "senhas-4d7ab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Função que gera a senha aleatória
function randomSenha() {
  return Math.random().toString(36).substring(2, 10).toUpperCase();
}

// Cria a senha no Firebase
window.gerarSenha = async function() {
  const senha = randomSenha();

  await setDoc(doc(db, "senhas", senha), {
    usada: false
  });

  document.getElementById("senha").innerText = "Sua senha: " + senha;
}

// Função que manda para o download com o ID do arquivo
window.irDownload = function() {
  const params = new URLSearchParams(window.location.search);
  const arquivo = params.get("arquivo"); // pega o ID do jogo
  window.location.href = "download.html?arquivo=" + arquivo;
}
</script>

</body>
</html>
