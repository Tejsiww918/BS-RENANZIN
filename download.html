<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Download</title>
</head>
<body>

<h2>Digite sua senha</h2>

<input type="text" id="inputSenha" placeholder="Digite a senha">
<button onclick="verificar()">Liberar Download</button>

<p id="status"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBQAQX1mUendOheuxjdQHSpMlIpC6DNb3Q",
  authDomain: "senhas-4d7ab.firebaseapp.com",
  projectId: "senhas-4d7ab"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.verificar = async function() {
  const senha = document.getElementById("inputSenha").value;
  const ref = doc(db, "senhas", senha);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    document.getElementById("status").innerText = "Senha inválida";
    return;
  }

  if (snap.data().usada) {
    document.getElementById("status").innerText = "Senha já utilizada";
    return;
  }

  await updateDoc(ref, { usada: true });

  document.getElementById("status").innerText = "Download liberado!";

  // COLOQUE AQUI SEU LINK DO MEDIAFIRE
  const params = new URLSearchParams(window.location.search);
const arquivo = params.get("arquivo");

if (arquivo === "aincrad") {
  window.location.href = "https://www.mediafire.com/file/70ltrqi3mtclok3/AINCRAD_3.0_.zip/file";
}

if (arquivo === "brmods") {
  window.location.href = "https://www.mediafire.com/file/zzwod5b4ln6bytv/BR_MODS_V7.apk/file";
}

if (arquivo === "stricks") {
  window.location.href = "https://www.mediafire.com/file/p6r9kcotffltdvz/STRICKS-BR-V2.7z/file";
}
}
</script>

</body>
</html>
